<div class="tela-principal-desktop">
  <app-header></app-header>
  <div class="page">
    <div class="frame-66">
      <app-side-menu></app-side-menu>
    </div>
    <div class="content">
      <div class="main-column">

        <div class="rotinas-header">
          <div class="titulo-pagina">Todas as Rotinas</div>
        </div>

        <div class="table-plan-1">
          <div class="table-header-component">
            <div class="table-header-cell icone-col"><div class="header-text">Ícone</div></div>
            <div class="table-header-cell nome-col"><div class="header-text">Nome</div></div>
            <div class="table-header-cell desc-col"><div class="header-text">Descrição</div></div>
          </div>

          <div class="table-row-instance" *ngFor="let rotina of rotinas()">
            <div class="table-cell icone-col">
              <div class="icon-circle">
                <img class="icon-img" [src]="'/assets/' + rotina.icone" />
              </div>
            </div>
            <div class="table-cell nome-col"><div class="cell-text bold">{{ rotina.titulo }}</div></div>
            <div class="table-cell desc-col"><div class="cell-text">{{ rotina.descricao }}</div></div>
          </div>
        </div>

      </div>
      <app-footer></app-footer>
    </div>
  </div>
</div>
